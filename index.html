<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surpresa de Realidade Aumentada ✨</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Arial, sans-serif;
            user-select: none;
        }
        
        /* Mensagem de instrução no topo */
        #instrucao {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 94, 98, 0.95);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            z-index: 999;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            font-size: 0.9rem;
            font-weight: bold;
            width: 85%;
            max-width: 320px;
            pointer-events: none;
        }

        /* Botão invisível em todo o ecrã para desbloquear o som do vídeo */
        #botao-play {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            cursor: pointer;
            transition: opacity 0.5s ease;
            padding: 20px;
            box-sizing: border-box;
        }

        #botao-play h2 {
            font-size: 1.6rem;
            margin-bottom: 10px;
        }

        #botao-play p {
            font-size: 1rem;
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div id="botao-play">
        <h2>Preparar Mágica ❤️</h2>
        <p>Toque em qualquer lugar do ecrã para ativar o som e abrir a câmara.</p>
    </div>

    <div id="instrucao">Aponte a câmara para a frase na caneca! ✨</div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-assets>
            <video id="video-mensagem" src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline webkit-playsinline></video>
        </a-assets>

        <a-marker type="pattern" url="https://raw.githubusercontent.com/subelacriativa/ra/main/pattern-Montserrat%20Extra%20Bold.patt" id="marcador">
            <a-video src="#video-mensagem" width="1.5" height="1.5" position="0 0.3 0" rotation="-90 0 0"></a-video>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const botaoPlay = document.getElementById('botao-play');
        const marcador = document.getElementById('marcador');
        const video = document.getElementById('video-mensagem');
        let somDesbloqueado = false;

        // Desbloqueia o áudio do navegador no primeiro toque do utilizador
        botaoPlay.addEventListener('click', function() {
            video.play().then(() => {
                video.pause(); // Prepara o vídeo em standby com som permitido
                somDesbloqueado = true;
                botaoPlay.style.opacity = '0';
                setTimeout(() => {
                    botaoPlay.style.display = 'none';
                }, 500);
            }).catch(error => {
                console.log("Erro ao iniciar o áudio:", error);
                // Caso falhe, avança mesmo assim para não travar o ecrã
                botaoPlay.style.display = 'none';
                somDesbloqueado = true;
            });
        });

        // Quando a câmara reconhecer a frase na caneca
        marcador.addEventListener('markerFound', function() {
            if (somDesbloqueado) {
                video.play();
            }
        });

        // Quando a câmara perder a caneca de vista
        marcador.addEventListener('markerLost', function() {
            video.pause();
        });
    </script>
</body>
</html>
